<!DOCTYPE html>
<html>

<head>

<meta charset = "utf-8">
<link type = "text/css" rel = "stylesheet" href = "additional_files/CSS/basic.css"></link>

</head>


<body>

当前时间：<span id = "current_time"></span>

<h1>Welcome to https://ahlxm2004.github.io.</h1>

<script type = "text/javascript">
	function play() {
		var time = new Date();
		var current_time =
			time.getFullYear() + "-" +
			time.getMonth().toString().padStart(2, '0') + "-" +
			time.getDate().toString().padStart(2, '0') + " " +
			time.getHours().toString().padStart(2, '0') + ":" +
			time.getMinutes().toString().padStart(2, '0') + ":" +
			time.getSeconds().toString().padStart(2, '0');
		document.getElementById("current_time").innerHTML = current_time;
	}

	play(); setInterval(play, 1000);
</script>

</body>

</html>
