<h3>七律·到韶山</h3>
毛泽东<br/><br/>
别梦依稀咒逝川，故园三十二年前。<br/>
红旗卷起农奴戟，黑手高悬霸主鞭。<br/>
为有牺牲多壮志，敢教日月换新天。<br/>
喜看稻菽千重浪，遍地英雄下夕烟。
