<center>
<h3>鹧鸪天</h3>
晏几道<br/><br/>
彩袖殷勤捧玉钟。当年拚却醉颜红。舞低杨柳楼心月，歌尽桃花扇底风。<br/>
从别后，忆相逢。几回魂梦与君同。今宵剩把银釭照，犹恐相逢是梦中。
</center>
