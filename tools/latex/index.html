<!DOCTYPE html>
<html>

<head>

<meta charset = "utf-8">
<link type = "text/css" rel = "stylesheet" href = "../../additional_files/CSS/basic.css"></link>
<script>MathJax = {tex: {inlineMath: [['$', '$'], ['\\(', '\\)']]}};</script>
<script id = "Mathjax-script" async src = "../../additional_files/MathJax/es5/tex-chtml.js"></script>

</head>


<body>

<p>$\LaTeX$ 编辑器</p>
<textarea id = "text" oninput = "convert(event)" style = "width: 100%"></textarea><br/>
<div id = "formula"></div>
<br/>

<script type="text/javascript">
	function convert(event) {
		var input = document.getElementById("text").value;
		var output = document.getElementById("formula");
		output.innerHTML = "";
		MathJax.texReset();
		var options = MathJax.getMetricsFor(output);
		MathJax.tex2chtmlPromise(input, options).then(
			function(node) {
				output.appendChild(node);
				MathJax.startup.document.clear();
				MathJax.startup.document.updateDocument();
			});
	}
</script>

</body>

</html>
